# ============================================================================
# BCCS Product Catalog - full local stack for on-site performance testing.
# 4 backend services + MariaDB + Redis + Kafka + ELK + Prometheus + Grafana.
#
#   cp .env.example .env   # then fill secrets
#   docker compose up -d --build
#
# Resilience note: backend services fail-open when Redis/Kafka are unavailable
# (catalog still serves from the DB; writes still commit). restart policies bring
# infra back automatically. No single infra node failure takes the platform down.
# ============================================================================
name: bccs-product-catalog

x-restart: &restart
  restart: unless-stopped

services:
  # -------------------- Data & messaging --------------------
  mariadb:
    image: mariadb:11.3
    <<: *restart
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      # Host 3307 -> container 3306 (host 3306 may be taken by a local MariaDB/MySQL).
      # Inter-container traffic still uses mariadb:3306 over the compose network.
      - "3307:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
      # Schema bootstrap on first start
      - ./product-catalog-service/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    <<: *restart
    # appendonly = data survives restart; maxmemory policy avoids OOM under bulk scans
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:3.7.1
    <<: *restart
    # KRaft mode (no ZooKeeper) — single combined broker/controller for local testing
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      # PLAINTEXT (9092) = traffic giữa các container; EXTERNAL (29092) = từ host (IDE debug)
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 30s

  # -------------------- Observability stack --------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    <<: *restart
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.4
    <<: *restart
    depends_on:
      elasticsearch:
        condition: service_healthy
    ports:
      - "5000:5000"
      - "5044:5044"
    volumes:
      - ./monitoring/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./monitoring/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    <<: *restart
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "5601:5601"

  prometheus:
    image: prom/prometheus:v2.52.0
    <<: *restart
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.0.0
    <<: *restart
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

  # -------------------- Backend services --------------------
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    <<: *restart
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # DB để nạp cấu hình rate-limit động theo đối tác
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CATALOG_URI: http://product-catalog-service:8081
      MANAGEMENT_URI: http://product-management-service:8082
      INTEGRATION_URI: http://integration-service:8083
      INTROSPECTION_URI: http://integration-service:8083/api/v1/integration/validate
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    ports:
      - "8080:8080"

  product-catalog-service:
    build:
      context: .
      dockerfile: product-catalog-service/Dockerfile
    <<: *restart
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    ports:
      - "8081:8081"

  product-management-service:
    build:
      context: .
      dockerfile: product-management-service/Dockerfile
    <<: *restart
    depends_on:
      mariadb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    ports:
      - "8082:8082"

  integration-service:
    build:
      context: .
      dockerfile: integration-service/Dockerfile
    <<: *restart
    environment:
      THIRD_PARTY_AUTH_URL: ${THIRD_PARTY_AUTH_URL}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: "5000"
    ports:
      - "8083:8083"

volumes:
  mariadb-data:
  redis-data:
  kafka-data:
  es-data:
  prometheus-data:
  grafana-data:
