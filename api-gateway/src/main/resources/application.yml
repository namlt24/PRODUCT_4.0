server:
  port: 8080
  # Never block the whole gateway on a single slow downstream
  netty:
    connection-timeout: 2s

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 200ms
      # If Redis dies, fail-open on rate limiting instead of taking the gateway down
      lettuce:
        cluster:
          refresh:
            adaptive: true
            period: 30s
  cloud:
    gateway:
      httpclient:
        connect-timeout: 1000
        response-timeout: 5s
        pool:
          max-connections: 2000
          acquire-timeout: 3000
      default-filters:
        # Strip hop-by-hop, ensure context headers exist downstream
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_UNIQUE
      routes:
        # -------- Read traffic (3rd-party data pull) --------
        - id: product-catalog
          uri: ${CATALOG_URI:http://product-catalog-service:8081}
          predicates:
            - Path=/api/v1/products/**,/api/v1/offers/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@clientIdKeyResolver}"
                redis-rate-limiter.replenishRate: 200      # tokens/sec per client
                redis-rate-limiter.burstCapacity: 400      # burst headroom
                redis-rate-limiter.requestedTokens: 1
            - name: CircuitBreaker
              args:
                name: catalogCircuitBreaker
                fallbackUri: forward:/fallback/catalog
            - name: Retry
              args:
                retries: 2
                statuses: BAD_GATEWAY,GATEWAY_TIMEOUT
                methods: GET
                backoff:
                  firstBackoff: 50ms
                  maxBackoff: 500ms
                  factor: 2

        # -------- Write traffic (management) --------
        - id: product-management
          uri: ${MANAGEMENT_URI:http://product-management-service:8082}
          predicates:
            - Path=/api/v1/management/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@clientIdKeyResolver}"
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
            - name: CircuitBreaker
              args:
                name: managementCircuitBreaker
                fallbackUri: forward:/fallback/management

        # -------- Integration / auth admin --------
        - id: integration
          uri: ${INTEGRATION_URI:http://integration-service:8083}
          predicates:
            - Path=/api/v1/integration/**
          filters:
            - name: CircuitBreaker
              args:
                name: integrationCircuitBreaker
                fallbackUri: forward:/fallback/integration

# ---- Resilience4j: protect the call into the 3rd-party auth provider ----
resilience4j:
  circuitbreaker:
    instances:
      authProvider:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 2s
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
      catalogCircuitBreaker:
        sliding-window-size: 30
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
      managementCircuitBreaker:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
      integrationCircuitBreaker:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
  timelimiter:
    instances:
      authProvider:
        timeout-duration: 2s

# ---- Auth configuration (no secrets hardcoded) ----
gateway:
  auth:
    # PEM body (base64) of the RSA public key for in-memory JWT validation
    jwt-public-key: ${JWT_PUBLIC_KEY:}
    # Fallback introspection endpoint exposed by integration-service
    introspection-uri: ${INTROSPECTION_URI:http://integration-service:8083/api/v1/integration/validate}
    # Paths that bypass authentication (comma-separated; bound to List<String> via @Value)
    permit-all: /actuator/health,/actuator/health/**,/actuator/prometheus,/fallback/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,gateway
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
