apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-service
  namespace: bccs
  labels:
    app: integration-service
    tier: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: integration-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: integration-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8083"
    spec:
      containers:
        - name: integration-service
          image: registry.local/bccs/integration-service:4.0.0
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: integration-config
            - secretRef:
                name: bccs-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "384Mi"
            limits:
              cpu: "1000m"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 40
            periodSeconds: 15
