server:
  port: 8083

spring:
  application:
    name: integration-service
  threads:
    virtual:
      enabled: true

integration:
  auth:
    # PEM body (base64) for local JWT validation. Empty => remote introspection only.
    jwt-public-key: ${JWT_PUBLIC_KEY:}
    introspection-url: ${THIRD_PARTY_AUTH_URL:https://auth.partner.example.com}/oauth2/introspect

resilience4j:
  circuitbreaker:
    instances:
      thirdPartyAuth:
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 2s
        slow-call-rate-threshold: 80
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      thirdPartyAuth:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - java.io.IOException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: w3c
