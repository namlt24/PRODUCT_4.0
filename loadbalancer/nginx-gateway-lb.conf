# Nginx đứng trước cụm API Gateway — đây là URL DUY NHẤT đối tác gọi vào.
# Một gateway chết -> nginx loại khỏi upstream (passive health check) và tự
# chuyển request sang gateway còn sống -> đối tác không thấy lỗi.

upstream bccs_gateways {
    least_conn;
    # max_fails/fail_timeout: sau 2 lần lỗi trong 10s, tạm loại node khỏi vòng quay
    server api-gateway-1:8080 max_fails=2 fail_timeout=10s;
    server api-gateway-2:8080 max_fails=2 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80;

    # Sức khỏe của chính LB
    location = /lb-health {
        add_header Content-Type text/plain;
        return 200 "lb ok\n";
    }

    location / {
        proxy_pass http://bccs_gateways;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 2s;
        proxy_read_timeout 15s;

        # FAILOVER: nếu một gateway lỗi/timeout/5xx -> thử gateway tiếp theo
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 5s;
    }
}
