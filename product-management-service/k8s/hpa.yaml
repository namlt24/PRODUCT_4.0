apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-management-hpa
  namespace: bccs
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-management-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
