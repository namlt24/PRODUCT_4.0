# Overlay HA cho API Gateway: 2 replica gateway + 1 Nginx Load Balancer.
# Mô phỏng môi trường thật: đối tác chỉ gọi vào LB (cổng 8888), không gọi gateway trực tiếp.
#
# Chạy (dùng chung network/redis với stack chính):
#   docker compose -f docker-compose.yml -f docker-compose.ha.yml up -d --build api-gateway-1 api-gateway-2 gateway-lb
#
# Test failover:
#   curl http://localhost:8888/actuator/health          # qua LB -> 200
#   docker compose -f docker-compose.yml -f docker-compose.ha.yml stop api-gateway-1
#   curl http://localhost:8888/actuator/health          # vẫn 200 (LB chuyển sang gateway-2)
#
# Downstream (catalog/management/integration) trỏ vào host (chạy IntelliJ hoặc container đã publish cổng)
# qua host.docker.internal nên kịch bản chạy được ở cả 2 chế độ.

name: bccs-product-catalog

x-gateway-common: &gateway-common
  build:
    context: .
    dockerfile: api-gateway/Dockerfile
  restart: unless-stopped
  depends_on:
    redis:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"
  environment:
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    CATALOG_URI: http://host.docker.internal:8081
    MANAGEMENT_URI: http://host.docker.internal:8082
    INTEGRATION_URI: http://host.docker.internal:8083
    INTROSPECTION_URI: http://host.docker.internal:8083/api/v1/integration/validate
    JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}

services:
  api-gateway-1:
    <<: *gateway-common
    # không publish cổng ra host: chỉ LB mới được tiếp xúc bên ngoài

  api-gateway-2:
    <<: *gateway-common

  gateway-lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api-gateway-1
      - api-gateway-2
    ports:
      - "8888:80"     # <-- URL DUY NHẤT đối tác gọi vào
    volumes:
      - ./loadbalancer/nginx-gateway-lb.conf:/etc/nginx/conf.d/default.conf:ro
