# ================= integration-service (không phụ thuộc infra) =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-service
  namespace: bccs
spec:
  replicas: 1
  selector:
    matchLabels: { app: integration-service }
  template:
    metadata:
      labels: { app: integration-service }
    spec:
      containers:
        - name: integration-service
          image: bccs-product-catalog-integration-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8083 }]
          envFrom:
            - configMapRef: { name: bccs-config }
            - secretRef: { name: bccs-secrets }
          resources:
            requests: { cpu: "100m", memory: "320Mi" }
            limits: { cpu: "1500m", memory: "768Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8083 }
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8083 }
            initialDelaySeconds: 70
            periodSeconds: 15
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: integration-service
  namespace: bccs
spec:
  selector: { app: integration-service }
  ports: [{ port: 8083, targetPort: 8083 }]
---
# ================= product-catalog-service (đọc + cache) =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-catalog-service
  namespace: bccs
spec:
  replicas: 1
  selector:
    matchLabels: { app: product-catalog-service }
  template:
    metadata:
      labels: { app: product-catalog-service }
    spec:
      initContainers:
        - name: wait-deps
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z mariadb 3306; do echo wait-db; sleep 2; done; until nc -z redis 6379; do echo wait-redis; sleep 2; done; until nc -z kafka 9092; do echo wait-kafka; sleep 2; done; echo deps-ready"]
      containers:
        - name: product-catalog-service
          image: bccs-product-catalog-product-catalog-service:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8081 }]
          envFrom:
            - configMapRef: { name: bccs-config }
            - secretRef: { name: bccs-secrets }
          resources:
            requests: { cpu: "150m", memory: "384Mi" }
            limits: { cpu: "1500m", memory: "768Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8081 }
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8081 }
            initialDelaySeconds: 70
            periodSeconds: 15
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: product-catalog-service
  namespace: bccs
spec:
  selector: { app: product-catalog-service }
  ports: [{ port: 8081, targetPort: 8081 }]
---
