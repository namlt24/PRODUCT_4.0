# ================= api-gateway (cổng vào, NodePort) =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: bccs
spec:
  replicas: 1
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      initContainers:
        - name: wait-redis
          image: busybox:1.36
          command: ["sh", "-c", "until nc -z redis 6379; do echo wait-redis; sleep 2; done; echo redis-ready"]
      containers:
        - name: api-gateway
          image: bccs-product-catalog-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8080 }]
          envFrom:
            - configMapRef: { name: bccs-config }
            - secretRef: { name: bccs-secrets }
          resources:
            requests: { cpu: "100m", memory: "320Mi" }
            limits: { cpu: "1500m", memory: "768Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health/readiness, port: 8080 }
            initialDelaySeconds: 25
            periodSeconds: 10
            failureThreshold: 20
          livenessProbe:
            httpGet: { path: /actuator/health/liveness, port: 8080 }
            initialDelaySeconds: 70
            periodSeconds: 15
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: bccs
spec:
  type: NodePort
  selector: { app: api-gateway }
  ports:
    - { port: 8080, targetPort: 8080, nodePort: 30080 }
