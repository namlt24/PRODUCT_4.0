# ---------------- Redis (L2 cache) ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: bccs
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          args: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          ports: [{ containerPort: 6379 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            exec: { command: ["redis-cli", "ping"] }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: bccs
spec:
  selector: { app: redis }
  ports: [{ port: 6379, targetPort: 6379 }]
---
# ---------------- MariaDB (shared schema) ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb
  namespace: bccs
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: mariadb }
  template:
    metadata:
      labels: { app: mariadb }
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.3
          ports: [{ containerPort: 3306 }]
          env:
            - name: MARIADB_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: bccs-secrets, key: MARIADB_ROOT_PASSWORD } }
            - name: MARIADB_DATABASE
              valueFrom: { configMapKeyRef: { name: bccs-config, key: DB_NAME } }
            - name: MARIADB_USER
              valueFrom: { secretKeyRef: { name: bccs-secrets, key: DB_USER } }
            - name: MARIADB_PASSWORD
              valueFrom: { secretKeyRef: { name: bccs-secrets, key: DB_PASSWORD } }
          volumeMounts:
            - { name: data, mountPath: /var/lib/mysql }
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d }
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1000m", memory: "768Mi" }
          readinessProbe:
            exec: { command: ["healthcheck.sh", "--connect", "--innodb_initialized"] }
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
      volumes:
        - name: data
          emptyDir: {}
        - name: initdb
          configMap: { name: mariadb-initdb }
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: bccs
spec:
  selector: { app: mariadb }
  ports: [{ port: 3306, targetPort: 3306 }]
---
# ---------------- Kafka (KRaft, single node) ----------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: bccs
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.7.1
          ports:
            - { containerPort: 9092 }
            - { containerPort: 9093 }
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            # localhost cho controller quorum: single-node tự kết nối, tránh phụ thuộc
            # ClusterIP Service readiness (deadlock: pod chưa Ready -> Service chưa có endpoint)
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@localhost:9093" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093" }
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0" }
            - { name: KAFKA_AUTO_CREATE_TOPICS_ENABLE, value: "true" }
            # Giới hạn heap để vừa limit 1Gi
            - { name: KAFKA_HEAP_OPTS, value: "-Xmx512M -Xms256M" }
          volumeMounts:
            - { name: data, mountPath: /var/lib/kafka/data }
          resources:
            requests: { cpu: "100m", memory: "384Mi" }
            limits: { cpu: "1000m", memory: "1Gi" }
          readinessProbe:
            tcpSocket: { port: 9092 }
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: bccs
spec:
  selector: { app: kafka }
  ports:
    - { name: plaintext, port: 9092, targetPort: 9092 }
    - { name: controller, port: 9093, targetPort: 9093 }
