apiVersion: v1
kind: Namespace
metadata:
  name: bccs
  labels:
    name: bccs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bccs-config
  namespace: bccs
data:
  # Service discovery dùng tên Service trong cùng namespace
  DB_HOST: "mariadb"
  DB_PORT: "3306"
  DB_NAME: "bccs_catalog"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  CATALOG_URI: "http://product-catalog-service:8081"
  MANAGEMENT_URI: "http://product-management-service:8082"
  INTEGRATION_URI: "http://integration-service:8083"
  INTROSPECTION_URI: "http://integration-service:8083/api/v1/integration/validate"
  THIRD_PARTY_AUTH_URL: "https://auth.partner.example.com"
  # 'local' để tắt Logstash appender trên cụm test (không có ELK) cho log sạch
  SPRING_PROFILES_ACTIVE: "local"
---
apiVersion: v1
kind: Secret
metadata:
  name: bccs-secrets
  namespace: bccs
type: Opaque
stringData:
  DB_USER: "bccs_app"
  DB_PASSWORD: "Bccs_App_2026"
  MARIADB_ROOT_PASSWORD: "Bccs_Root_2026"
  REDIS_PASSWORD: ""
  JWT_PUBLIC_KEY: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-initdb
  namespace: bccs
data:
  schema.sql: |
    CREATE TABLE IF NOT EXISTS product (
        id           VARCHAR(64)  NOT NULL,
        code         VARCHAR(64)  NOT NULL,
        name         VARCHAR(255) NOT NULL,
        category     VARCHAR(64),
        status       VARCHAR(16)  NOT NULL,
        description  VARCHAR(2000),
        updated_at   TIMESTAMP    NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
        PRIMARY KEY (id),
        UNIQUE KEY uk_product_code (code),
        KEY idx_product_category (category),
        KEY idx_product_status (status)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;

    CREATE TABLE IF NOT EXISTS offer (
        id            VARCHAR(64)   NOT NULL,
        product_id    VARCHAR(64)   NOT NULL,
        code          VARCHAR(64)   NOT NULL,
        name          VARCHAR(255),
        price         DECIMAL(18,2) NOT NULL,
        currency      VARCHAR(8)    DEFAULT 'VND',
        billing_cycle VARCHAR(16),
        status        VARCHAR(16),
        PRIMARY KEY (id),
        UNIQUE KEY uk_offer_code (code),
        KEY idx_offer_product (product_id),
        CONSTRAINT fk_offer_product FOREIGN KEY (product_id) REFERENCES product (id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
