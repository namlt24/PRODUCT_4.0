apiVersion: v1
kind: Namespace
metadata:
  name: bccs
  labels:
    name: bccs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bccs-config
  namespace: bccs
data:
  # DB_HOST=mariadb được phân giải tới DB NGOÀI qua Service ExternalName trong 05-external-db.yaml
  # (MariaDB không còn chạy trong cụm — xem scripts/external-db/).
  DB_HOST: "mariadb"
  DB_PORT: "3306"
  DB_NAME: "bccs_catalog"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  CATALOG_URI: "http://product-catalog-service:8081"
  MANAGEMENT_URI: "http://product-management-service:8082"
  INTEGRATION_URI: "http://integration-service:8083"
  INTROSPECTION_URI: "http://integration-service:8083/api/v1/integration/validate"
  # 'local' để tắt Logstash appender trên cụm test (không có ELK) cho log sạch
  SPRING_PROFILES_ACTIVE: "local"
---
apiVersion: v1
kind: Secret
metadata:
  name: bccs-secrets
  namespace: bccs
type: Opaque
stringData:
  # Phải KHỚP với tài khoản tạo trên DB ngoài (scripts/external-db/docker-compose.yml)
  DB_USER: "bccs_app"
  DB_PASSWORD: "Bccs_App_2026"
  REDIS_PASSWORD: ""
  JWT_PUBLIC_KEY: ""
# Lưu ý: schema KHÔNG còn nhúng ở đây. DB ngoài tự nạp schema.sql khi khởi tạo
# (mount trong scripts/external-db/docker-compose.yml) — schema chỉ còn MỘT nguồn.
