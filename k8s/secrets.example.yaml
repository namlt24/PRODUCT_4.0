# Template only. Do NOT commit real secrets. Create the real Secret out-of-band, e.g.:
#
#   kubectl -n bccs create secret generic bccs-secrets \
#     --from-literal=DB_USER='bccs_app' \
#     --from-literal=DB_PASSWORD='<strong-password>' \
#     --from-literal=REDIS_PASSWORD='<redis-password>' \
#     --from-literal=JWT_PUBLIC_KEY='<base64-rsa-public-key>'
#
# Or manage via Sealed Secrets / External Secrets Operator / Vault in production.
apiVersion: v1
kind: Secret
metadata:
  name: bccs-secrets
  namespace: bccs
type: Opaque
stringData:
  DB_USER: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  REDIS_PASSWORD: "REPLACE_ME"
  JWT_PUBLIC_KEY: "REPLACE_ME"
