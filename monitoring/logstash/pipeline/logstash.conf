# Logstash pipeline: ingest JSON application logs (TCP) and index them into Elasticsearch.
# Apps emit one JSON object per line via logstash-logback-encoder.

input {
  # Services ship logs over TCP using the logback json_lines codec
  tcp {
    port => 5000
    codec => json_lines
  }
  # Optionally also accept Filebeat shipping container stdout
  beats {
    port => 5044
  }
}

filter {
  # The message is already structured JSON; normalize the timestamp.
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd'T'HH:mm:ss.SSSZ"]
    target => "@timestamp"
  }

  # Promote correlation fields to top-level keyword fields for fast Kibana filtering.
  mutate {
    rename => { "traceId" => "[trace][id]" }
    rename => { "spanId" => "[span][id]" }
    rename => { "clientId" => "[partner][client_id]" }
    rename => { "serviceName" => "[service][name]" }
  }

  if [level] {
    mutate { uppercase => ["level"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # Daily indices so retention / rollover is easy
    index => "bccs-logs-%{[service][name]}-%{+YYYY.MM.dd}"
  }
  # Uncomment for debugging the pipeline locally
  # stdout { codec => rubydebug }
}
